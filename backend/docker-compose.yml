services:
  api:
    build: .
    container_name: adminds-api
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./templates:/app/templates:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s